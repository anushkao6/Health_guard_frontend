<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Disease Library — HealthBot AI</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/theme.js"></script>
    <style>
      .disease-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
        gap: 1.5rem;
      }
      .disease-card {
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        cursor: pointer;
      }
      .disease-card:hover { transform: translateY(-5px); border-color: var(--color-primary); }
      .disease-icon {
        width: 54px; height: 54px;
        border-radius: 14px;
        background: var(--color-primary-light);
        color: var(--color-primary);
        display: flex; align-items: center; justify-content: center;
        font-weight: 800; font-size: 1.5rem;
      }
      .badge-category {
        padding: 0.25rem 0.65rem;
        border-radius: 6px;
        background: var(--bg-main);
        color: var(--text-muted);
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        width: fit-content;
      }
    </style>
  </head>
  <body>
    <header class="site-header" id="site-header"></header>

    <div class="container">
      <div style="margin-bottom: 3.5rem; text-align: center;">
        <h1 style="font-size: 2.5rem; margin-bottom: 0.75rem;">Disease Library</h1>
        <p class="text-secondary" style="max-width: 600px; margin: 0 auto;">Explore symptoms, prevention, and evidence-based awareness for common health conditions in plain language.</p>
        
        <div style="margin-top: 2rem; display: flex; justify-content: center; gap: 0.75rem;">
           <input type="text" id="disease-search" class="btn btn-secondary" style="text-align:left; font-weight:400; padding:0.75rem 1.5rem; cursor:text; min-width:320px;" placeholder="Search diseases (e.g. Dengue, Malaria)..." />
        </div>
      </div>

      <div class="disease-grid" id="disease-list">
        <!-- JS Injection -->
        <p class="text-center text-muted" style="grid-column: 1/-1;">Fetching disease catalog...</p>
      </div>

      <div id="no-results" style="display: none; text-align: center; padding: 4rem 1rem;">
         <h3 class="text-secondary">No diseases found matching your search.</h3>
         <p class="text-muted">Try a different keyword or browse all categories.</p>
      </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/nav.js"></script>
    <script>
      hgRenderNav("awareness");

      async function loadDiseases() {
        const grid = document.getElementById("disease-list");
        const noR = document.getElementById("no-results");
        try {
          let list = await hgFetch("/diseases", { method: "GET" });
          
          function render(data) {
            grid.innerHTML = "";
            if (!data.length) { grid.style.display = 'none'; noR.style.display = 'block'; }
            else {
              grid.style.display = 'grid';
              noR.style.display = 'none';
              grid.innerHTML = data.map(d => `
                <div class="card disease-card" onclick="location.href='/disease-detail.html?name=${encodeURIComponent(d.name)}'">
                  <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <div class="disease-icon">${d.name.charAt(0)}</div>
                    <span class="badge-category">${d.category || 'General'}</span>
                  </div>
                  <div>
                    <h3 style="font-size:1.35rem; margin-bottom:0.5rem;">${d.name}</h3>
                    <p class="text-secondary" style="font-size:0.92rem; line-height:1.6; display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical; overflow:hidden;">${d.causes || d.treatment || 'No description available.'}</p>
                  </div>
                  <div style="margin-top:auto; font-weight:700; color:var(--color-primary); font-size:0.85rem; display:flex; align-items:center; gap:0.5rem;">
                    Learn awareness strategy <span style="font-size:1.1rem;">&rarr;</span>
                  </div>
                </div>`).join("");
            }
          }

          render(list);

          document.getElementById("disease-search").addEventListener("input", (e) => {
             const q = e.target.value.toLowerCase().trim();
             const filtered = list.filter(d => d.name.toLowerCase().includes(q) || (d.causes && d.causes.toLowerCase().includes(q)));
             render(filtered);
          });

        } catch (e) { grid.innerHTML = `<p class="text-danger center">${e.message}</p>`; }
      }

      loadDiseases();
    </script>
  </body>
</html>
